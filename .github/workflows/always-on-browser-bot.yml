name: Telegram Gemini Browser Bot

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo snap remove firefox 2>/dev/null || true
          sudo add-apt-repository -y ppa:mozillateam/ppa
          echo 'Package: firefox*' | sudo tee /etc/apt/preferences.d/mozilla-firefox
          echo 'Pin: release o=LP-PPA-mozillateam' | sudo tee -a /etc/apt/preferences.d/mozilla-firefox
          echo 'Pin-Priority: 1001' | sudo tee -a /etc/apt/preferences.d/mozilla-firefox
          sudo apt-get update
          sudo apt-get install -y firefox xvfb x11vnc novnc websockify fluxbox
          pip3 install selenium webdriver-manager opencv-python-headless requests numpy google-genai playwright
          playwright install-deps firefox
          playwright install firefox

      - name: Setup VNC & Tunnel
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 1
          fluxbox &
          sleep 1
          firefox &
          sleep 5
          x11vnc -display :99 -forever -nopw -quiet &
          sleep 2
          websockify --web=/usr/share/novnc 6080 localhost:5900 &
          sleep 2
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:6080 2>&1 | tee /tmp/cf-log &
          sleep 12
          URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' /tmp/cf-log | head -n 1)
          echo "NOVNC_URL=$URL" >> $GITHUB_ENV

      - name: Run Gemini-Powered Bot
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OWNER_CHAT_ID: ${{ secrets.OWNER_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOVNC_URL: ${{ env.NOVNC_URL }}
        run: |
          python3 - << 'PYEOF'
          import os, sys, time, io, base64, requests, numpy as np, cv2
          from google import genai
          from selenium import webdriver
          from selenium.webdriver.firefox.options import Options
          from selenium.webdriver.firefox.service import Service
          from webdriver_manager.firefox import GeckoDriverManager

          TOKEN = os.environ['BOT_TOKEN']
          OWNER = os.environ['OWNER_CHAT_ID']
          NOVNC_URL = os.environ.get('NOVNC_URL', '')
          GEMINI_API_KEY = os.environ['GEMINI_API_KEY']
          BASE = f"https://api.telegram.org/bot{TOKEN}"
          MODEL_NAME = "gemini-2.5-computer-use-preview-10-2025"

          # --- Init Gemini ---
          client = genai.Client(api_key=GEMINI_API_KEY)

          # --- Init Selenium ---
          opts = Options()
          opts.add_argument("--headless")
          opts.add_argument("--window-size=1920,1080")
          svc = Service(executable_path=GeckoDriverManager().install())
          driver = webdriver.Firefox(service=svc, options=opts)
          driver.set_window_size(1920, 1080)
          driver.get("about:blank")

          def screenshot():
              return base64.b64decode(driver.get_screenshot_as_base64())

          def send_msg(chat, text, reply_markup=None):
              requests.post(f"{BASE}/sendMessage",
                            json={"chat_id": chat, "text": text, "reply_markup": reply_markup})

          def send_photo(chat, img_bytes, caption=""):
              files = {"photo": ("screen.png", io.BytesIO(img_bytes), "image/png")}
              requests.post(f"{BASE}/sendPhoto", data={"chat_id": chat, "caption": caption}, files=files)

          def execute_action(action):
              """Execute a single action returned by Gemini Computer Use."""
              if action is None:
                  return
              fn = action.get("name")
              args = action.get("args", {})
              if fn == "navigate":
                  driver.get(args["url"])
              elif fn == "click":
                  from selenium.webdriver.common.action_chains import ActionChains
                  act = ActionChains(driver)
                  act.move_by_offset(args["x"], args["y"]).click().perform()
                  act.reset_actions()
              elif fn == "type":
                  from selenium.webdriver.common.keys import Keys
                  driver.switch_to.active_element.send_keys(args["text"])
              elif fn == "scroll":
                  driver.execute_script(f"window.scrollBy(0, {args.get('dy', 0)})")
              elif fn == "wait":
                  time.sleep(5)
              elif fn == "go_back":
                  driver.back()
              elif fn == "go_forward":
                  driver.forward()
              elif fn == "refresh":
                  driver.refresh()
              elif fn == "key_combination":
                  from selenium.webdriver.common.keys import Keys
                  keys = args["keys"]
                  driver.switch_to.active_element.send_keys(*[getattr(Keys, k.upper(), k) for k in keys])
              # More actions can be added as needed

          # --- Gemini Agent Loop ---
          def run_gemini_task(chat_id, goal, max_steps=15):
              driver.get("about:blank")
              contents = [{"role": "user", "parts": [{"text": goal}]}]
              for step in range(max_steps):
                  img = screenshot()
                  contents.append({
                      "role": "user",
                      "parts": [
                          {"inline_data": {"mime_type": "image/png", "data": base64.b64encode(img).decode()}}
                      ]
                  })
                  try:
                      resp = client.models.generate_content(
                          model=MODEL_NAME,
                          contents=contents,
                          config={
                              "tools": [{"computer_use": {"environment": "browser"}}],
                              "temperature": 0.2
                          }
                      )
                  except Exception as e:
                      send_msg(chat_id, f"❌ Gemini error: {e}")
                      return

                  if not resp.candidates:
                      send_msg(chat_id, "❌ No response from Gemini.")
                      return

                  candidate = resp.candidates[0]
                  if not candidate.content or not candidate.content.parts:
                      send_msg(chat_id, "✅ Task completed.")
                      break

                  part = candidate.content.parts[0]
                  if part.text:
                      send_msg(chat_id, f"💬 Gemini: {part.text[:200]}")
                      break
                  elif part.function_call:
                      action = {
                          "name": part.function_call.name,
                          "args": dict(part.function_call.args)
                      }
                      execute_action(action)
                      time.sleep(1)
                      # Send screenshot after action
                      send_photo(chat_id, screenshot(), caption=f"🖱️ Action: {action['name']}")
                      # Append model response to history
                      contents.append({
                          "role": "model",
                          "parts": [{"function_call": part.function_call}]
                      })
                  else:
                      send_msg(chat_id, "🤷 Unknown response part.")
                      break

          # --- Telegram Bot Setup ---
          main_kb = {
              "keyboard": [
                  ["🖱️ Click", "⌨️ Type", "🔄 Refresh"],
                  ["🌐 Live Browser"]
              ],
              "resize_keyboard": True
          }

          inline_kb = None
          if NOVNC_URL:
              inline_kb = {"inline_keyboard": [[{"text": "🌐 Open Live Browser", "url": NOVNC_URL}]]}

          send_msg(OWNER, "🚀 Gemini Browser Bot is online (5h 58m).\n"
                           "Send any natural language task and I'll execute it in the browser.\n"
                           "Example: 'Go to wikipedia.org and search for artificial intelligence'",
                           reply_markup=main_kb)
          if inline_kb:
              send_msg(OWNER, "⬇️ Or use the live browser:", reply_markup=inline_kb)

          # --- Main Loop ---
          runtime = 5 * 3600 + 58 * 60
          end_at = time.time() + runtime
          offset = 0

          while time.time() < end_at:
              try:
                  resp = requests.get(f"{BASE}/getUpdates?timeout=25&offset={offset}").json()
              except:
                  continue
              if not resp.get("result"):
                  continue
              for upd in resp["result"]:
                  offset = upd["update_id"] + 1
                  msg = upd.get("message")
                  if not msg or str(msg["chat"]["id"]) != OWNER:
                      continue
                  text = msg.get("text", "")
                  if text.startswith("/"):
                      cmd = text.split()[0]
                      if cmd == "/go":
                          url = text[4:].strip()
                          run_gemini_task(OWNER, f"Navigate to {url}")
                      elif cmd == "/task":
                          run_gemini_task(OWNER, text[6:].strip())
                  elif text in ["🖱️ Click", "⌨️ Type", "🔄 Refresh"]:
                      run_gemini_task(OWNER, f"Perform a {text} action")
                  elif text == "🌐 Live Browser":
                      if NOVNC_URL:
                          send_msg(OWNER, f"🌐 Live browser: {NOVNC_URL}", reply_markup=main_kb)
                      else:
                          send_msg(OWNER, "❌ Live browser not available in this cycle.", reply_markup=main_kb)
                  elif text:
                      run_gemini_task(OWNER, text)
              time.sleep(0.3)

          driver.quit()
          send_msg(OWNER, "😴 5:58 finished, restarting in 2 minutes.")
          PYEOF
